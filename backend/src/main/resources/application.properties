# Server
server.port=8080

# PostgreSQL (Supabase Session Pooler - IPv4 compatible)
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# JPA - schema already exists in Supabase, do not modify it
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Supabase JWT secret
supabase.jwt.secret=${SUPABASE_JWT_SECRET}

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
