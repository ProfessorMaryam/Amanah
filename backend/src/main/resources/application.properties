# Server
server.port=8080

# PostgreSQL (Supabase session pooler - port 6543)
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres?sslmode=require&stringtype=unspecified&prepareThreshold=0
spring.datasource.username=postgres.jkobgqcoednzpbfktogj
spring.datasource.password=${SUPABASE_DB_PASSWORD:amanahisgowafr}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# JPA - schema already exists in Supabase, do not modify it
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT secret for HMAC256 signing (min 32 chars)
jwt.secret=${JWT_SECRET:amanah-secret-key-change-in-production-32ch}

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Debug logging
logging.level.com.amanah=DEBUG
logging.level.org.springframework.security=DEBUG
